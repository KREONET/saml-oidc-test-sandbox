# Expose mod_shib's SSO/ACS/SLO/Metadata/Status endpoints.
<Location /Shibboleth.sso>
    SetHandler shib
</Location>

# Shibboleth web resources (styles, icons).
Alias /shibboleth-sp/main.css /usr/share/shibboleth/main.css

# Lazy Shibboleth auth site-wide: if there's a Shib session, mod_shib
# populates REMOTE_USER + Shib-* env vars, Auth_remoteuser wakes up a
# MediaWiki session. No Shib session ⇒ MediaWiki renders as anonymous.
<Location />
    AuthType shibboleth
    ShibRequestSetting requireSession 0
    Require shibboleth
</Location>

# The single "Log in" entry point on MediaWiki side: Special:UserLogin.
# Force a Shib session here ⇒ mod_shib redirects to Keycloak, pulls
# back the assertion, and then MediaWiki completes the login via
# Auth_remoteuser.
#
# MediaWiki renders the Log-in link in two shapes depending on skin
# context:
#   /wiki/Special:UserLogin?returnto=...
#   /index.php?title=Special:UserLogin&returnto=...
# Apache's <LocationMatch> only sees the path (no query string), so
# the short-URL form matches directly while the index.php form has
# to be gated by an <If> on %{QUERY_STRING}.
<LocationMatch "^/(wiki/)?Special:UserLogin">
    AuthType shibboleth
    ShibRequestSetting requireSession 1
    Require valid-user
</LocationMatch>

<Location /index.php>
    <If "%{QUERY_STRING} =~ /(?:^|&)title=Special(?::|%3A)UserLogin(?:$|&)/">
        AuthType shibboleth
        ShibRequestSetting requireSession 1
        Require valid-user
    </If>
</Location>
