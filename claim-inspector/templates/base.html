<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}OIDC Test Sandbox{% endblock %}</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
               max-width: 1100px; margin: 2rem auto; padding: 0 1rem; color: #222; }
        h1 { border-bottom: 2px solid #0b6623; padding-bottom: .3rem; }
        h2 { color: #0b6623; margin-top: 2rem; }
        a.btn { display: inline-block; padding: .5rem 1rem; background: #0b6623;
                color: white; text-decoration: none; border-radius: 4px; }
        a.btn:hover { background: #084a1a; }
        table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
        th, td { padding: .4rem .6rem; border: 1px solid #ddd; text-align: left;
                 vertical-align: top; font-size: .9rem; }
        th { background: #f4f4f4; }
        pre { background: #f8f8f8; padding: .8rem; border-radius: 4px;
              overflow-x: auto; font-size: .85rem; }
        .yes { color: #0b6623; font-weight: bold; }
        .no  { color: #c00; }
        .muted { color: #888; font-style: italic; }
        .protocol { background: #fffbe6; }
        .user-claim { background: #e6f4ff; }
        .hit { background: #e6ffe6; }
        .tag { display: inline-block; padding: 1px 6px; border-radius: 3px;
               font-size: .75rem; background: #eee; }
        nav { margin-bottom: 1rem; }
        nav a { margin-right: 1rem; }
    </style>
</head>
<body>
<nav>
    <a href="/">Home</a>
    <a href="/me">/me</a>
    <a href="/me.json">/me.json</a>
    <a href="/logout">Logout</a>
</nav>
{% block body %}{% endblock %}
</body>
</html>
