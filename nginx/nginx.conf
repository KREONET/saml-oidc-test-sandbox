events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Docker's embedded DNS — defer upstream resolution to request time so
    # optional services (e.g. owiki-app under --profile wiki) don't block startup.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ────────────────────────────────────────────────────────────
    # iam.sandbox.ac.kr  →  Keycloak
    # ────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name iam.sandbox.ac.kr;

        location / {
            set $upstream_iam iam-app:8080;
            proxy_pass http://$upstream_iam;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;

            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }
    }

    # ────────────────────────────────────────────────────────────
    # owiki.sandbox.ac.kr  →  Outline (OIDC SP)
    # ────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name owiki.sandbox.ac.kr;

        location / {
            set $upstream_owiki owiki-app:3000;
            proxy_pass http://$upstream_owiki;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }
    }

    # ────────────────────────────────────────────────────────────
    # otest.sandbox.ac.kr  →  claim-inspector (Flask, OIDC RP)
    # ────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name otest.sandbox.ac.kr;

        location / {
            set $upstream_otest otest-app:5000;
            proxy_pass http://$upstream_otest;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }
    }

    # ────────────────────────────────────────────────────────────
    # stest.sandbox.ac.kr  →  saml-inspector (Flask + pysaml2, SAML SP)
    # Upstream may not be running yet; resolver defers DNS to request time.
    # ────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name stest.sandbox.ac.kr;

        location / {
            set $upstream_stest stest-app:5000;
            proxy_pass http://$upstream_stest;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }
    }

    # ────────────────────────────────────────────────────────────
    # swiki.sandbox.ac.kr  →  MediaWiki (SAML SP via PluggableAuth)
    # Upstream may not be running yet; resolver defers DNS to request time.
    # ────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name swiki.sandbox.ac.kr;

        location / {
            set $upstream_swiki swiki-app:80;
            proxy_pass http://$upstream_swiki;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }
    }

    # Default: unknown Host → 404
    server {
        listen 80 default_server;
        server_name _;
        return 404;
    }
}
